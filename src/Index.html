      id="desktop-sidebar"
      data-i18n-aria-label="a11y.primaryNavigation"
    >
      <div
        class="app-sidebar-content"
        id="desktop-sidebar-content"
      ></div>
    </aside>

    <div class="app-workspace">
      <header class="app-topbar">
        <div class="app-topbar-leading">
          <button
            type="button"
            class="menu-button"
            id="navigation-drawer-button"
            aria-controls="navigation-drawer"
            aria-expanded="false"
          >
            <span class="menu-button-icon" aria-hidden="true">
              ☰
            </span>
            <span data-i18n-text="shell.menu"></span>
          </button>

          <div class="topbar-app-identity">
            <strong data-app-name></strong>
            <span data-app-subtitle></span>
          </div>
        </div>

        <div id="page-header"></div>
        <div id="student-mobile-language"></div>
      </header>

      <main
        class="app-main"
        id="main-content"
        tabindex="-1"
      >
        <div id="content" class="loading"></div>
      </main>
    </div>
  </div>

  <nav
    class="mobile-navigation"
    id="mobile-navigation"
    aria-label=""
  ></nav>

  <div
    class="navigation-drawer"
    id="navigation-drawer"
    aria-hidden="true"
    hidden
  >
    <button
      type="button"
      class="navigation-drawer-backdrop"
      id="navigation-drawer-backdrop"
      tabindex="-1"
      data-i18n-aria-label="shell.closeMenu"
    ></button>
    <aside
      class="navigation-drawer-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="navigation-drawer-title"
    >
      <div class="overlay-heading-row drawer-heading-row">
        <h2
          id="navigation-drawer-title"
          data-i18n-text="shell.navigation"
        ></h2>
        <button
          type="button"
          class="icon-button"
          id="navigation-drawer-close"
          data-i18n-aria-label="shell.closeMenu"
        >
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div id="navigation-drawer-content"></div>
    </aside>
  </div>

  <div id="dialog-host" hidden></div>
  <div id="side-panel-host" hidden></div>
