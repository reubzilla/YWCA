<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <style>
    <?!= include_('Styles'); ?>
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="header-row">
        <div>
          <h1 id="app-name"></h1>
          <p id="app-subtitle"></p>
        </div>

        <div class="language-control">
          <label
            id="language-label"
            class="language-label"
            for="language-selector"
          ></label>

          <select
            id="language-selector"
            class="language-selector"
          ></select>
        </div>
      </div>
    </header>

    <nav
      id="navigation"
      class="navigation hidden"
      aria-label=""
    ></nav>

    <div id="content" class="loading">
    </div>
  </main>

  <script>
    let portalData = null;
    let currentView = 'home';
    let currentDashboardSessionId = null;

    const availabilityDrafts = {};

    <?!= include_('Helpers'); ?>
    <?!= include_('Localization'); ?>

    initialiseLanguageSelector();
    initialiseStaticTranslations();

    document.addEventListener(
      'DOMContentLoaded',
      loadPortal
    );

    function loadPortal() {
      google.script.run
        .withSuccessHandler(initialisePortal)
        .withFailureHandler(renderError)
        .getPortalData();
    }

    function initialisePortal(data) {
      portalData = data;

      renderNavigation(data.permissions);
      selectView(currentView);
    }

    function renderNavigation(permissions) {
      const navigation =
        document.getElementById('navigation');

      const items = [
        { id: 'home', label: t('nav.home') },
        { id: 'availability', label: t('nav.availability') },
        {
          id: 'volunteer',
          label: t('nav.volunteerSchedule')
        },
        { id: 'attendance', label: t('nav.checkIn') }
      ];

      if (permissions.canViewDashboard) {
        items.push({
          id: 'dashboard',
          label: t('nav.dashboard')
        });
      }

      navigation.innerHTML = items.map(item => `
        <button
          class="nav-button ${item.id === currentView ? 'active' : ''}"
          data-view="${escapeHtml(item.id)}"
          type="button"
        >
          ${escapeHtml(item.label)}
        </button>
      `).join('');

      navigation.classList.remove('hidden');

      navigation
        .querySelectorAll('.nav-button')
        .forEach(button => {
          button.addEventListener('click', () => {
            selectView(button.dataset.view);
          });
        });
    }

    function selectView(view) {
      currentView = view;

      document
        .querySelectorAll('.nav-button')
        .forEach(button => {
          button.classList.toggle(
            'active',
            button.dataset.view === view
          );
        });

      switch (view) {
        case 'home':
          renderHome();
          break;

        case 'availability':
  renderAvailability();
  break;

        case 'volunteer':
          renderPlaceholder(
            t('nav.volunteerSchedule'),
            t('volunteer.placeholder')
          );
          break;

        case 'attendance':
          renderPlaceholder(
            t('nav.checkIn'),
            t('attendance.placeholder')
          );
          break;

        case 'dashboard':
  renderDashboard();
  break;
      }
    }

    function renderHome() {
      const content =
        document.getElementById('content');

      const user = portalData.user;
      const notifications =
        portalData.notifications || [];
      const sessions =
        portalData.sessions || [];

      let html = `
        <section class="card">
          <h2 class="user-name">
            ${t('home.welcome', {
              name: escapeHtml(user.name)
            })}
          </h2>

          <p class="user-details">
            ${escapeHtml(translateBusinessValue(
              'role',
              user.role
            ))}
            ${user.grade
              ? ` · ${escapeHtml(user.grade)}`
              : ''}
            <br>
            ${escapeHtml(user.email)}
          </p>
        </section>

        <h2 class="section-title">
          ${t('home.notificationsTitle')}
        </h2>
      `;

      if (notifications.length === 0) {
        html += `
          <section class="card empty">
            ${t('home.noNotifications')}
          </section>
        `;
      } else {
        notifications.forEach(notification => {
          html += `
            <article
              class="notification
                ${escapeHtml(notification.priority)}"
            >
              <p class="notification-title">
                ${escapeHtml(notification.title)}
              </p>

              <p class="notification-message">
                ${escapeHtml(notification.message)}
              </p>

              <div class="notification-date">
                ${escapeHtml(notification.date)}
              </div>
            </article>
          `;
        });
      }

      html += `
        <h2 class="section-title">
          ${t('home.upcomingSessionsTitle')}
        </h2>
      `;

      if (sessions.length === 0) {
        html += `
          <section class="card empty">
            ${t('home.noUpcomingSessions')}
          </section>
        `;
      } else {
        sessions.forEach(session => {
          const timeText = buildTimeText(
            session.startTime,
            session.endTime
          );

          html += `
            <section class="card">
              <div class="session-date">
                ${escapeHtml(session.date)}
              </div>

              <h3 class="session-title">
                ${escapeHtml(session.title)}
              </h3>

              <p class="session-details">
                ${timeText
                  ? escapeHtml(timeText)
                  : t('session.timeNotSpecified')}
              </p>

              <span class="session-type">
                ${escapeHtml(translateBusinessValue(
                  'sessionType',
                  session.sessionType
                ))}
              </span>

              ${session.responseDeadline
                ? `
                  <p
                    class="session-details"
                    style="margin-top: 12px;"
                  >
                    ${t('session.responseDeadlineLabel')}
                    ${escapeHtml(
                      session.responseDeadline
                    )}
                  </p>
                `
                : ''}

              ${session.notes
                ? `
                  <div class="notes">
                    ${escapeHtml(session.notes)}
                  </div>
                `
                : ''}
            </section>
          `;
        });
      }

      content.className = '';
      content.innerHTML = html;
    }
function renderAvailability() {
  const content =
    document.getElementById('content');

  content.className = '';
  content.innerHTML = `
    <h2 class="section-title">
      ${t('availability.title')}
    </h2>

    <section class="card availability-loading">
      ${t('availability.loading')}
    </section>
  `;

  google.script.run
    .withSuccessHandler(renderAvailabilityData)
    .withFailureHandler(renderAvailabilityError)
    .getAvailabilityPageData();
}


function renderAvailabilityData(data) {
  const content =
    document.getElementById('content');

  const sessions = data.sessions || [];

  let html = `
    <h2 class="section-title">
      ${t('availability.title')}
    </h2>

    <section class="card">
      <p style="margin: 0; line-height: 1.6;">
        ${t('availability.instructions')}
      </p>
    </section>
  `;

  if (sessions.length === 0) {
    html += `
      <section class="card empty">
        ${t('availability.noSessions')}
      </section>
    `;

    content.innerHTML = html;
    return;
  }

  sessions.forEach(session => {
    html += buildAvailabilityCard(session);
  });

  content.innerHTML = html;

  sessions.forEach(session => {
    restoreAvailabilityDraft(session.sessionId);
    initialiseAvailabilityCard(session.sessionId);
  });
}


function captureAvailabilityDrafts() {
  document
    .querySelectorAll('.availability-card')
    .forEach(card => {
      const sessionId = card.dataset.sessionId;

      const selectedResponse = card.querySelector(
        'input[type="radio"]:checked'
      );

      const noteInput = card.querySelector(
        '.note-input'
      );

      availabilityDrafts[sessionId] = {
        response: selectedResponse
          ? selectedResponse.value
          : '',
        reason: noteInput ? noteInput.value : ''
      };
    });
}


function restoreAvailabilityDraft(sessionId) {
  const draft = availabilityDrafts[sessionId];

  if (!draft) {
    return;
  }

  const noteInput =
    document.getElementById(`reason-${sessionId}`);

  if (noteInput) {
    noteInput.value = draft.reason;
  }

  if (draft.response) {
    const responseInput = document.querySelector(
      `input[name="response-${cssEscape(
        sessionId
      )}"][value="${cssEscape(draft.response)}"]`
    );

    if (responseInput) {
      responseInput.checked = true;
    }
  }

  const count =
    document.getElementById(`count-${sessionId}`);

  if (count) {
    count.textContent = t(
      'availability.characterCount',
      {
        count: draft.reason.length,
        max: 500
      }
    );
  }
}


function buildAvailabilityCard(session) {
  const availability =
    session.availability || {};

  const response =
    availability.response || '';

  const status = getStatusDisplay(response);

  const timeText = buildTimeText(
    session.startTime,
    session.endTime
  );

  const safeSessionId =
    escapeHtml(session.sessionId);

  return `
    <section
      class="card availability-card"
      id="availability-card-${safeSessionId}"
      data-session-id="${safeSessionId}"
    >
      <div class="session-date">
        ${escapeHtml(session.date)}
      </div>

      <h3 class="session-title">
        ${escapeHtml(session.title)}
      </h3>

      <p class="session-details">
        ${timeText
          ? escapeHtml(timeText)
          : t('session.timeNotSpecified')}
      </p>

      <span
        id="status-${safeSessionId}"
        class="current-status ${status.className}"
      >
        ${escapeHtml(status.label)}
      </span>

      ${session.responseDeadline
        ? `
          <p
            class="session-details"
            style="margin-top: 12px;"
          >
            ${t('session.responseDeadlineLabel')}
            ${escapeHtml(session.responseDeadline)}
          </p>
        `
        : ''}

      <div
        class="response-options"
        role="radiogroup"
       aria-label="${escapeHtml(t(
         'availability.responseGroupAriaLabel',
         { title: session.title }
       ))}"
      >
        ${buildResponseOption(
          session.sessionId,
          'Available',
          t('availability.status.available'),
          response
        )}

        ${buildResponseOption(
          session.sessionId,
          'Unavailable',
          t('availability.status.unavailable'),
          response
        )}

        ${buildResponseOption(
          session.sessionId,
          'Unsure',
          t('availability.status.unsure'),
          response
        )}
      </div>

      <label
        class="form-label"
        for="reason-${safeSessionId}"
      >
        ${t('availability.privateNoteLabel')}
      </label>

      <textarea
        class="note-input"
        id="reason-${safeSessionId}"
        maxlength="500"
        placeholder="${escapeHtml(
          t('availability.privateNotePlaceholder')
        )}"
      >${escapeHtml(availability.reason || '')}</textarea>

      <p class="form-help">
        ${t('availability.privateNoteHelp')}
      </p>

      <div
        class="character-count"
        id="count-${safeSessionId}"
      >
        ${t('availability.characterCount', {
          count: (availability.reason || '').length,
          max: 500
        })}
      </div>

      <div class="form-actions">
        <button
          class="primary-button"
          id="save-${safeSessionId}"
          type="button"
        >
          ${t('availability.saveButton')}
        </button>

        <span
          class="save-message"
          id="message-${safeSessionId}"
          role="status"
          aria-live="polite"
        ></span>
      </div>

      ${availability.updatedAt
        ? `
          <div
            class="updated-time"
            id="updated-${safeSessionId}"
          >
            ${t('availability.lastUpdated', {
              updatedAt: escapeHtml(availability.updatedAt)
            })}
          </div>
        `
        : `
          <div
            class="updated-time"
            id="updated-${safeSessionId}"
          ></div>
        `}

      ${session.notes
        ? `
          <div class="notes">
            ${escapeHtml(session.notes)}
          </div>
        `
        : ''}
    </section>
  `;
}


function buildResponseOption(
  sessionId,
  value,
  label,
  currentResponse
) {
  const inputId =
    `response-${sessionId}-${value}`;

  const checked =
    currentResponse === value
      ? 'checked'
      : '';

  return `
    <div class="response-option">
      <input
        type="radio"
        id="${escapeHtml(inputId)}"
        name="response-${escapeHtml(sessionId)}"
        value="${escapeHtml(value)}"
        ${checked}
      >

      <label for="${escapeHtml(inputId)}">
        ${escapeHtml(label)}
      </label>
    </div>
  `;
}


function initialiseAvailabilityCard(sessionId) {
  const saveButton =
    document.getElementById(`save-${sessionId}`);

  const noteInput =
    document.getElementById(`reason-${sessionId}`);

  if (!saveButton || !noteInput) {
    return;
  }

  saveButton.addEventListener('click', () => {
    submitAvailability(sessionId);
  });

  noteInput.addEventListener('input', () => {
    const count =
      document.getElementById(`count-${sessionId}`);

    if (count) {
      count.textContent =
        t('availability.characterCount', {
          count: noteInput.value.length,
          max: 500
        });
    }
  });
}


function submitAvailability(sessionId) {
  const selectedResponse =
    document.querySelector(
      `input[name="response-${cssEscape(sessionId)}"]:checked`
    );

  const reasonInput =
    document.getElementById(`reason-${sessionId}`);

  const saveButton =
    document.getElementById(`save-${sessionId}`);

  const message =
    document.getElementById(`message-${sessionId}`);

  if (!selectedResponse) {
    message.textContent =
      t('availability.validation.responseRequired');

    message.classList.add('error-message');
    return;
  }

  message.textContent = '';
  message.classList.remove('error-message');

  saveButton.disabled = true;
  saveButton.textContent = t('availability.saving');

  google.script.run
    .withSuccessHandler(result => {
      handleAvailabilitySaved(
        result,
        sessionId
      );
    })
    .withFailureHandler(error => {
      handleAvailabilitySaveError(
        error,
        sessionId
      );
    })
    .saveAvailability({
      sessionId: sessionId,
      response: selectedResponse.value,
      reason: reasonInput.value
    });
}


function handleAvailabilitySaved(
  result,
  sessionId
) {
  const saveButton =
    document.getElementById(`save-${sessionId}`);

  const message =
    document.getElementById(`message-${sessionId}`);

  const status =
    document.getElementById(`status-${sessionId}`);

  const updated =
    document.getElementById(`updated-${sessionId}`);

  const statusDisplay =
    getStatusDisplay(result.response);

  saveButton.disabled = false;
  saveButton.textContent = t('availability.saveButton');

  message.classList.remove('error-message');
  message.textContent = result.message;

  status.className =
    `current-status ${statusDisplay.className}`;

  status.textContent =
    statusDisplay.label;

  updated.textContent =
    t('availability.lastUpdated', {
      updatedAt: result.updatedAt
    });

  /*
   * Refresh the cached portal information so the Home
   * notifications are correct when the student returns.
   */
  google.script.run
    .withSuccessHandler(data => {
      portalData = data;
    })
    .withFailureHandler(() => {
      // The availability has already saved successfully,
      // so a background refresh failure can be ignored.
    })
    .getPortalData();
}


function handleAvailabilitySaveError(
  error,
  sessionId
) {
  const saveButton =
    document.getElementById(`save-${sessionId}`);

  const message =
    document.getElementById(`message-${sessionId}`);

  saveButton.disabled = false;
  saveButton.textContent = t('availability.saveButton');

  message.classList.add('error-message');
  message.textContent =
    error && error.message
      ? error.message
      : t('availability.error.saveFailed');
}


function renderAvailabilityError(error) {
  const content =
    document.getElementById('content');

  content.innerHTML = `
    <h2 class="section-title">
      ${t('availability.title')}
    </h2>

    <section class="error">
      ${escapeHtml(
        error && error.message
          ? error.message
          : t('availability.error.loadFailed')
      )}
    </section>
  `;
}


function getStatusDisplay(response) {
  switch (response) {
    case 'Available':
      return {
        label: t('availability.status.available'),
        className: 'available'
      };

    case 'Unavailable':
      return {
        label: t('availability.status.unavailable'),
        className: 'unavailable'
      };

    case 'Unsure':
      return {
        label: t('availability.status.unsure'),
        className: 'unsure'
      };

    default:
      return {
        label: t('availability.status.noResponse'),
        className: 'no-response'
      };
  }
}


function renderDashboard() {
  const content =
    document.getElementById('content');

  content.className = '';
  content.innerHTML = `
    <h2 class="section-title">
      ${t('dashboard.title')}
    </h2>

    <section class="card availability-loading">
      ${t('dashboard.loadingToday')}
    </section>
  `;

  google.script.run
    .withSuccessHandler(renderDashboardData)
    .withFailureHandler(renderDashboardError)
    .getDashboardData();
}


function renderDashboardData(data) {
  const content =
    document.getElementById('content');

  const sessions = data.sessions || [];

  if (sessions.length === 0) {
    content.innerHTML = `
      <h2 class="section-title">
        ${t('dashboard.title')}
      </h2>

      <section class="card">
        <p class="dashboard-date">
          ${escapeHtml(data.todayLabel)}
        </p>

        <div class="dashboard-empty">
          ${t('dashboard.noSessionToday')}
        </div>
      </section>
    `;

    return;
  }

  let selector = '';

  if (sessions.length > 1) {
    selector = `
      <label
        class="form-label"
        for="dashboard-session-selector"
      >
        ${t('dashboard.sessionSelectorLabel')}
      </label>

      <select
        id="dashboard-session-selector"
        class="session-selector"
      >
        ${sessions.map(session => `
          <option
            value="${escapeHtml(session.sessionId)}"
          >
            ${escapeHtml(session.title)}
            ${session.startTime
              ? ` — ${escapeHtml(session.startTime)}`
              : ''}
          </option>
        `).join('')}
      </select>
    `;
  }

  content.innerHTML = `
    <h2 class="section-title">
      ${t('dashboard.title')}
    </h2>

    <section class="card">
      <p class="dashboard-date">
        ${escapeHtml(data.todayLabel)}
      </p>

      ${selector}
    </section>

    <div id="dashboard-session-content"></div>
  `;

  if (sessions.length > 1) {
    const selectorElement =
      document.getElementById(
        'dashboard-session-selector'
      );

    const retainedSession = sessions.find(session =>
      session.sessionId === currentDashboardSessionId
    );

    if (retainedSession) {
      selectorElement.value = retainedSession.sessionId;
    }

    selectorElement.addEventListener(
      'change',
      () => {
        currentDashboardSessionId =
          selectorElement.value;

        loadDashboardSession(
          selectorElement.value
        );
      }
    );
  }

  const selectedSession = sessions.find(session =>
    session.sessionId === currentDashboardSessionId
  );

  if (
    selectedSession &&
    data.selectedSession &&
    data.selectedSession.session.sessionId !==
      selectedSession.sessionId
  ) {
    loadDashboardSession(selectedSession.sessionId);
  } else {
    renderDashboardSession(data.selectedSession);
  }
}


function loadDashboardSession(sessionId) {
  const container =
    document.getElementById(
      'dashboard-session-content'
    );

  container.innerHTML = `
    <section class="card availability-loading">
      ${t('dashboard.loadingSession')}
    </section>
  `;

  google.script.run
    .withSuccessHandler(renderDashboardSession)
    .withFailureHandler(renderDashboardError)
    .getDashboardSession(sessionId);
}


function renderDashboardSession(data) {
  const container =
    document.getElementById(
      'dashboard-session-content'
    );

  if (!container || !data) {
    return;
  }

  currentDashboardSessionId = data.session.sessionId;

  const session = data.session;
  const summary = data.summary;
  const groups = data.groups;

  const timeText = buildTimeText(
    session.startTime,
    session.endTime
  );

  let html = `
    <section class="card">
      <h2 class="dashboard-session-heading">
        ${escapeHtml(session.title)}
      </h2>

      <p class="dashboard-session-meta">
        ${escapeHtml(session.date)}
        ${timeText
          ? `<br>${escapeHtml(timeText)}`
          : ''}
      </p>

      ${session.notes
        ? `
          <div class="notes">
            ${escapeHtml(session.notes)}
          </div>
        `
        : ''}
    </section>

    <div class="dashboard-refresh-row">
      <button
        type="button"
        class="secondary-button"
        id="refresh-dashboard-button"
      >
        ${t('common.refresh')}
      </button>
    </div>

    <section class="summary-grid">
      ${buildSummaryCard(
        summary.activeMembers,
        t('dashboard.summary.activeMembers'),
        ''
      )}

      ${buildSummaryCard(
        summary.available,
        t('dashboard.summary.available'),
        'positive'
      )}

      ${buildSummaryCard(
        summary.volunteers,
        t('dashboard.summary.volunteers'),
        'positive'
      )}

      ${buildSummaryCard(
        summary.unavailable,
        t('dashboard.summary.unavailable'),
        summary.unavailable > 0
          ? 'problem'
          : ''
      )}

      ${buildSummaryCard(
        summary.unsure,
        t('dashboard.summary.unsure'),
        summary.unsure > 0
          ? 'attention'
          : ''
      )}

      ${buildSummaryCard(
        summary.noResponse,
        t('dashboard.summary.noResponse'),
        summary.noResponse > 0
          ? 'attention'
          : ''
      )}
    </section>
  `;

  if (
    groups.conflicts &&
    groups.conflicts.length > 0
  ) {
    html += buildConflictBox(groups.conflicts);
  }

  html += buildDashboardGroup(
    t('dashboard.group.volunteers'),
    groups.volunteers,
    'volunteer'
  );

  html += buildDashboardGroup(
    t('dashboard.group.available'),
    groups.available,
    'available'
  );

  html += buildDashboardGroup(
    t('dashboard.group.unavailable'),
    groups.unavailable,
    'unavailable'
  );

  html += buildDashboardGroup(
    t('dashboard.group.unsure'),
    groups.unsure,
    'unsure'
  );

  html += buildDashboardGroup(
    t('dashboard.group.noResponse'),
    groups.noResponse,
    'no-response'
  );

  html += `
    <h2 class="section-title">
      ${t('dashboard.attendance.title')}
    </h2>

    <section class="card">
      <p style="margin: 0; line-height: 1.6;">
        ${t('dashboard.attendance.summary', {
          recorded: `<strong>${summary.attendanceRecorded}</strong>`,
          expected: `<strong>${summary.expected}</strong>`
        })}
      </p>

      <p
        class="session-details"
        style="margin-top: 8px;"
      >
        ${t('dashboard.attendance.futureNotice')}
      </p>
    </section>
  `;

  container.innerHTML = html;

  const refreshButton =
    document.getElementById(
      'refresh-dashboard-button'
    );

  if (refreshButton) {
    refreshButton.addEventListener('click', () => {
      refreshButton.disabled = true;
      refreshButton.textContent = t('common.refreshing');

      loadDashboardSession(session.sessionId);
    });
  }
}


function buildSummaryCard(
  number,
  label,
  className
) {
  return `
    <div class="summary-card ${escapeHtml(
      className || ''
    )}">
      <span class="summary-number">
        ${escapeHtml(number)}
      </span>

      <span class="summary-label">
        ${escapeHtml(label)}
      </span>
    </div>
  `;
}


function buildDashboardGroup(
  title,
  members,
  type
) {
  const list = members || [];

  return `
    <section class="dashboard-group">
      <div class="dashboard-group-header">
        <h3 class="dashboard-group-title">
          ${escapeHtml(title)}
        </h3>

        <span class="dashboard-count">
          ${list.length}
        </span>
      </div>

      ${list.length === 0
        ? `
          <div class="dashboard-empty">
            ${t('dashboard.group.empty')}
          </div>
        `
        : `
          <ul class="member-list">
            ${list.map(member =>
              buildDashboardMember(member, type)
            ).join('')}
          </ul>
        `}
    </section>
  `;
}


function buildDashboardMember(member, type) {
  let details = [];

  if (member.grade) {
    details.push(member.grade);
  }

  if (type === 'volunteer' && member.volunteer) {
    if (member.volunteer.activity) {
      details.push(member.volunteer.activity);
    }

    if (member.volunteer.location) {
      details.push(member.volunteer.location);
    }

    if (member.volunteer.departureTime) {
      details.push(
        t('dashboard.volunteer.departureTime', {
          time: member.volunteer.departureTime
        })
      );
    }
  }

  return `
    <li class="member-row">
      <div class="member-name">
        ${escapeHtml(member.name)}
      </div>

      ${details.length > 0
        ? `
          <div class="member-meta">
            ${details
              .map(escapeHtml)
              .join(' · ')}
          </div>
        `
        : ''}

      ${member.reason
        ? `
          <div class="member-reason">
            ${escapeHtml(member.reason)}
          </div>
        `
        : ''}
    </li>
  `;
}


function buildConflictBox(conflicts) {
  return `
    <section class="conflict-box">
      <h3>${t('dashboard.conflict.title')}</h3>

      <p style="margin: 0 0 10px; line-height: 1.5;">
        ${t('dashboard.conflict.description')}
      </p>

      <ul style="margin-bottom: 0;">
        ${conflicts.map(member => `
          <li>
            <strong>
              ${escapeHtml(member.name)}
            </strong>
            ${member.reason
              ? ` — ${escapeHtml(member.reason)}`
              : ''}
          </li>
        `).join('')}
      </ul>
    </section>
  `;
}


function renderDashboardError(error) {
  const content =
    document.getElementById('content');

  content.className = '';
  content.innerHTML = `
    <h2 class="section-title">
      ${t('dashboard.title')}
    </h2>

    <section class="error">
      ${escapeHtml(
        error && error.message
          ? error.message
          : t('dashboard.error.loadFailed')
      )}
    </section>
  `;
}
  </script>
</body>
</html>
